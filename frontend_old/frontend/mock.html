<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mirror AI - Mock Interview</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand" onclick="window.location.href='home.html'" style="cursor: pointer;">&larr; End Interview</div>
    <div class="nav-links">
      <span>Question: <span id="q-num">1</span>/5</span>
    </div>
  </nav>

  <div class="container" style="max-width: 800px;">
    <!-- Setup Section -->
    <div id="setup-section" class="card" style="margin-bottom: 2rem;">
      <h2>Job Description</h2>
      <p style="color: var(--text-muted); margin-bottom: 1rem;">Paste the job description here so AI can tailor the questions.</p>
      <textarea id="jd-input" rows="6" style="width: 100%; background: #2a2a2a; color: white; border: 1px solid #444; border-radius: 8px; padding: 1rem; font-family: 'Inter', sans-serif;" placeholder="e.g. Seeking a Data Analyst with SQL and Python skills..."></textarea>
      <button class="btn" style="margin-top: 1rem;" onclick="startInterview()">Start Interview</button>
    </div>

    <!-- Interview Section (Hidden Initially) -->
    <div id="interview-section" style="display: none;">
      <div class="card" style="margin-bottom: 2rem; border-left: 4px solid var(--accent);">
        <h3 style="margin-top: 0;">AI Interviewer</h3>
        <p id="ai-question" style="font-size: 1.1rem; line-height: 1.5;">Generating first question based on JD...</p>
      </div>

      <div class="card" style="margin-bottom: 2rem;">
        <h3 style="margin-top: 0;">Your Answer</h3>
        <div id="user-answer" style="min-height: 80px; padding: 1rem; background: #2a2a2a; border-radius: 8px; color: var(--text-muted); font-style: italic;">
          Click the mic to start speaking...
        </div>
        <div style="margin-top: 1rem; display: flex; gap: 1rem;">
          <button id="mic-btn" class="btn" style="background-color: #ef4444;" onclick="toggleMic()">🎤 Start Recording</button>
          <button class="btn" style="background-color: #10b981;" onclick="submitAnswer()">Submit Answer</button>
        </div>
      </div>

      <!-- Feedback Section -->
      <div id="feedback-section" class="card" style="display: none; border-left: 4px solid #f59e0b;">
        <h3 style="margin-top: 0; color: #f59e0b;">Instant Feedback</h3>
        <div style="display: flex; gap: 2rem; margin-bottom: 1rem;">
          <div><strong>Score:</strong> <span id="fb-score" style="font-size: 1.5rem; color: #10b981;">8/10</span></div>
        </div>
        <p><strong>Good:</strong> <span id="fb-good">...</span></p>
        <p><strong>Missing:</strong> <span id="fb-missing">...</span></p>
        <p><strong>Suggestion:</strong> <span id="fb-suggestion">...</span></p>
        <button class="btn" style="margin-top: 1rem; width: 100%;" onclick="nextQuestion()">Next Question &rarr;</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth, db, collection, addDoc, onAuthStateChanged } from './firebase-config.js';
    
    let currentUser = null;
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = 'index.html';
      } else {
        currentUser = user;
      }
    });

    let currentQuestion = 1;
    let conversationHistory = [];
    let isRecording = false;
    let recognition;
    
    // Initialize Web Speech API
    if ('webkitSpeechRecognition' in window) {
      recognition = new webkitSpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = 'en-IN'; // Fallback to auto detection can be tricky, but Claude handles text language well
      
      recognition.onresult = function(event) {
        let interimTranscript = '';
        let finalTranscript = '';
        for (let i = event.resultIndex; i < event.results.length; ++i) {
          if (event.results[i].isFinal) {
            finalTranscript += event.results[i][0].transcript;
          } else {
            interimTranscript += event.results[i][0].transcript;
          }
        }
        
        const ansDiv = document.getElementById('user-answer');
        if (finalTranscript) {
          ansDiv.innerText = finalTranscript; // Real implementation might append if continuous is long
        } else if (interimTranscript) {
          ansDiv.innerText = interimTranscript;
        }
        ansDiv.style.color = 'white';
        ansDiv.style.fontStyle = 'normal';
      };
      
      recognition.onerror = function(event) {
        console.error("Speech recognition error", event.error);
        if (isRecording) toggleMic();
      };
    } else {
      alert("Your browser does not support Speech Recognition. Please use Chrome.");
    }

    function speakText(text) {
      if ('speechSynthesis' in window) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-IN';
        window.speechSynthesis.speak(utterance);
      }
    }

    async function startInterview() {
      const jd = document.getElementById('jd-input').value;
      if(!jd.trim()) { alert("Please paste a JD first!"); return; }
      
      document.getElementById('setup-section').style.display = 'none';
      document.getElementById('interview-section').style.display = 'block';
      document.getElementById('ai-question').innerText = "Loading first question...";
      
      try {
        const response = await fetch('http://localhost:5000/start-interview', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ jd: jd })
        });
        const data = await response.json();
        if (data.error) throw new Error(data.error);
        
        document.getElementById('ai-question').innerText = data.question;
        conversationHistory.push({ role: "assistant", content: data.question });
        speakText(data.question);
      } catch (err) {
        console.error(err);
        document.getElementById('ai-question').innerText = "Error loading question.";
      }
    }

    function toggleMic() {
      if (!recognition) return;
      
      const btn = document.getElementById('mic-btn');
      isRecording = !isRecording;
      
      if(isRecording) {
        btn.innerText = "🛑 Stop Recording";
        document.getElementById('user-answer').innerText = "(Listening...)";
        document.getElementById('user-answer').style.color = 'var(--text-muted)';
        document.getElementById('user-answer').style.fontStyle = 'italic';
        recognition.start();
      } else {
        btn.innerText = "🎤 Start Recording";
        recognition.stop();
      }
    }

    async function submitAnswer() {
      if(isRecording) toggleMic(); 
      
      const answer = document.getElementById('user-answer').innerText;
      if (!answer || answer.includes("Listening...")) {
        alert("Please record an answer first.");
        return;
      }
      
      document.getElementById('feedback-section').style.display = 'block';
      document.getElementById('fb-good').innerText = "Loading...";
      document.getElementById('fb-missing').innerText = "Loading...";
      document.getElementById('fb-suggestion').innerText = "Loading...";
      document.getElementById('fb-score').innerText = "...";
      
      conversationHistory.push({ role: "user", content: answer });
      
      try {
        const jd = document.getElementById('jd-input').value;
        const payload = {
          jd: jd,
          answer: answer,
          question_number: currentQuestion + 1,
          history: conversationHistory
        };
        
        const response = await fetch('http://localhost:5000/submit-answer', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await response.json();
        
        if (data.error) throw new Error(data.error);
        
        document.getElementById('fb-score').innerText = data.score + "/10";
        document.getElementById('fb-good').innerText = data.good;
        document.getElementById('fb-missing').innerText = data.missing;
        document.getElementById('fb-suggestion').innerText = data.suggestion;
        
        // Save the next question globally but don't show it yet
        window.nextQuestionText = data.next_question;
        
      } catch (err) {
        console.error(err);
        document.getElementById('fb-good').innerText = "Error getting feedback.";
      }
    }

    async function nextQuestion() {
      document.getElementById('feedback-section').style.display = 'none';
      document.getElementById('user-answer').innerText = "Click the mic to start speaking...";
      document.getElementById('user-answer').style.color = 'var(--text-muted)';
      document.getElementById('user-answer').style.fontStyle = 'italic';
      
      if(currentQuestion >= 5) {
        document.getElementById('ai-question').innerText = "Generating final report... please wait.";
        
        try {
          const jd = document.getElementById('jd-input').value;
          const payload = {
            jd: jd,
            answer: "",
            question_number: 6,
            history: conversationHistory
          };
          
          const response = await fetch('http://localhost:5000/end-interview', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          const data = await response.json();
          
          if(currentUser) {
            await addDoc(collection(db, 'interviews'), {
              userId: currentUser.uid,
              role: document.getElementById('jd-input').value.substring(0, 30) + '...', // brief role description
              date: new Date().toISOString(),
              overall_score: data.overall_score,
              strongest_answer: data.strongest_answer,
              weakest_area: data.weakest_area,
              tips: data.tips
            });
          }
          
          alert("Interview Complete! Final report saved. Redirecting to Dashboard.");
          window.location.href = 'dashboard.html';
        } catch (error) {
          console.error("Error saving final report:", error);
          alert("Error saving report.");
        }
      } else {
        currentQuestion++;
        document.getElementById('q-num').innerText = currentQuestion;
        
        const qText = window.nextQuestionText;
        document.getElementById('ai-question').innerText = qText;
        conversationHistory.push({ role: "assistant", content: qText });
        speakText(qText);
      }
    }
    
    // Expose functions to window for onclick handlers since this is now a module
    window.startInterview = startInterview;
    window.toggleMic = toggleMic;
    window.submitAnswer = submitAnswer;
    window.nextQuestion = nextQuestion;
  </script>
</body>
</html>
