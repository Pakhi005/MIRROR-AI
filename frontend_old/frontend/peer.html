<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mirror AI - Online Peers</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    /* Basic Modal Styles for Incoming Request */
    #request-modal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--card-bg);
      border: 1px solid #444;
      padding: 2rem;
      border-radius: 8px;
      z-index: 1000;
      text-align: center;
      width: 300px;
    }
    #request-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 999;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand" onclick="window.location.href='home.html'" style="cursor: pointer;">&larr; Back to Home</div>
    <div class="nav-links">
      <span style="color: #10b981;">● Online Now: <span id="online-count">0</span></span>
    </div>
  </nav>

  <div class="container">
    <div class="header" style="text-align: left; display: flex; justify-content: space-between; align-items: center;">
      <div>
        <h1>Peer Connect</h1>
        <p style="color: var(--text-muted)">Connect with students for mock practice</p>
      </div>
      <div>
        <select style="padding: 0.5rem; background: var(--card-bg); color: white; border: 1px solid #333; border-radius: 4px; margin-right: 1rem;">
          <option>All Domains</option>
          <option>Web Dev</option>
          <option>Data Science</option>
        </select>
        <button class="btn">Random Match</button>
      </div>
    </div>

    <div class="grid-3" id="user-grid">
      <!-- Live users will be rendered here -->
    </div>
  </div>

  <div id="request-overlay"></div>
  <div id="request-modal">
    <h3 id="request-text">User wants to connect!</h3>
    <div style="margin-top: 1.5rem; display: flex; gap: 1rem; justify-content: center;">
      <button class="btn" style="background-color: #ef4444;" onclick="declineRequest()">Decline</button>
      <button class="btn" style="background-color: #10b981;" onclick="acceptRequest()">Accept</button>
    </div>
  </div>

  <script>
    // Prompt user for demo details (In real app, this comes from Firebase Auth)
    let myName = prompt("Enter your name for the session:", "Guest " + Math.floor(Math.random() * 1000));
    if (!myName) myName = "Anonymous";
    
    let myDomain = prompt("Enter your domain (e.g., WebDev, AIML):", "Software Engineering");
    if (!myDomain) myDomain = "Tech";

    let myYear = "Demo User";
    let pendingRequestSocketId = null;

    const socket = io('http://localhost:3000');

    socket.on('connect', () => {
      console.log("Connected to Socket.io server");
      // Join the peer pool
      socket.emit('join', {
        name: myName,
        domain: myDomain,
        year: myYear
      });
    });

    socket.on('online-users', (users) => {
      document.getElementById('online-count').innerText = users.length;
      
      const grid = document.getElementById('user-grid');
      grid.innerHTML = ''; // clear current list

      users.forEach(user => {
        // Don't show ourselves in the list
        if (user.socketId === socket.id) return;

        const initials = user.name.substring(0, 2).toUpperCase();
        
        const card = document.createElement('div');
        card.className = 'card text-center';
        card.innerHTML = `
          <div class="avatar" style="width: 60px; height: 60px; border-radius: 50%; background: #333; margin: 0 auto 1rem; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">${initials}</div>
          <h3>${user.name}</h3>
          <p style="color: var(--text-muted); font-size: 0.9rem;">${user.year}<br>${user.domain}</p>
          <button class="btn" style="width: 100%; margin-top: 1rem;" onclick="connectPeer('${user.socketId}')">Connect</button>
        `;
        grid.appendChild(card);
      });
    });

    // Send connection request
    function connectPeer(targetSocketId) {
      alert("Request sent! Waiting for response...");
      socket.emit('connect-request', {
        targetSocketId,
        fromName: myName,
        fromDomain: myDomain
      });
    }

    // Receive connection request
    socket.on('receive-request', (data) => {
      const { fromSocketId, fromName, fromDomain } = data;
      pendingRequestSocketId = fromSocketId;
      document.getElementById('request-text').innerText = `${fromName} (${fromDomain}) wants to practice!`;
      document.getElementById('request-modal').style.display = 'block';
      document.getElementById('request-overlay').style.display = 'block';
    });

    function declineRequest() {
      pendingRequestSocketId = null;
      document.getElementById('request-modal').style.display = 'none';
      document.getElementById('request-overlay').style.display = 'none';
    }

    async function acceptRequest() {
      document.getElementById('request-modal').style.display = 'none';
      document.getElementById('request-overlay').style.display = 'none';
      
      // Call our backend to create a Daily.co room
      try {
        const response = await fetch('http://localhost:3000/create-room', { method: 'POST' });
        const roomData = await response.json();
        const roomUrl = roomData.url;
        
        // Notify the requester that we accepted and share the room URL
        socket.emit('connect-accepted', {
          targetSocketId: pendingRequestSocketId,
          roomUrl: roomUrl
        });
        
        // Join the room ourselves
        joinVideoRoom(roomUrl);
      } catch (err) {
        alert("Failed to create room.");
        console.error(err);
      }
    }

    // When the user we requested accepts our request
    socket.on('request-accepted', (data) => {
      alert("Request Accepted! Joining room...");
      joinVideoRoom(data.roomUrl);
    });

    function joinVideoRoom(url) {
      // Open Daily.co room in a new tab
      window.open(url, "_blank");
      
      // Start a 30-min timer locally (mocked down to 5 seconds for testing easily, or keep 30 mins)
      alert("A 30-minute practice session has started in a new tab! We'll ask you about it later.");
      setTimeout(() => {
        const feedback = confirm("Kya interview practice ki? (Click OK for Yes to get AI feedback)");
        if (feedback) {
           alert("Great! Feature: AI will now analyze the transcript.");
        } else {
           alert("Session ended normally.");
        }
      }, 30 * 60 * 1000); // 30 minutes
    }
  </script>
</body>
</html>
