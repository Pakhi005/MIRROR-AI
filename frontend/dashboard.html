<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mirror AI - Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .dashboard-grid {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* Stats Row */
    .stats-row {
      display: grid;
      gap: 24px;
      grid-template-columns: 1fr;
    }
    @media (min-width: 768px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
    }
    @media (min-width: 1024px) {
      .stats-row { grid-template-columns: repeat(4, 1fr); }
    }
    
    .stat-card {
      padding: 24px;
    }
    .stat-label {
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 12px;
    }
    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    .stat-change {
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .text-up { color: var(--accent-success); }

    /* Middle Row */
    .middle-row {
      display: grid;
      gap: 24px;
      grid-template-columns: 1fr;
    }
    @media (min-width: 1024px) {
      .middle-row { grid-template-columns: 6fr 4fr; }
    }
    
    .chart-container {
      position: relative;
      height: 250px;
      width: 100%;
    }
    
    .weak-areas {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .area-item {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .area-label {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
    }

    /* Recent Sessions */
    .session-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .session-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .session-card:hover {
      border-color: var(--accent-primary);
    }
    .session-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      cursor: pointer;
    }
    .session-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .session-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: rgba(14, 143, 99, 0.1);
      color: var(--accent-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    .session-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }
    .session-meta {
      font-size: 14px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    
    .score-badge {
      font-family: 'JetBrains Mono', monospace;
      padding: 4px 8px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 14px;
    }
    .score-high { background: rgba(14, 143, 99, 0.12); color: var(--accent-success); }
    .score-mid  { background: rgba(181, 117, 15, 0.12); color: var(--accent-warning); }
    .score-low  { background: rgba(178, 58, 48, 0.12); color: var(--accent-danger); }
    
    .btn-expand {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.25s;
      flex-shrink: 0;
    }
    .btn-expand:hover {
      background: var(--accent-primary);
      border-color: var(--accent-primary);
      color: white;
    }
    .btn-expand.open {
      transform: rotate(180deg);
    }

    /* Expandable Detail Panel */
    .session-detail {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease;
    }
    .session-detail.open {
      max-height: 2000px;
    }
    .session-detail-inner {
      padding: 0 16px 20px;
      border-top: 1px solid var(--border-color);
    }

    /* JD Section */
    .jd-section {
      margin-top: 16px;
      margin-bottom: 20px;
    }
    .jd-section h4 {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .jd-text {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-primary);
      white-space: pre-wrap;
      max-height: 80px;
      overflow: hidden;
      transition: max-height 0.3s ease;
      position: relative;
    }
    .jd-text.expanded {
      max-height: 600px;
      overflow-y: auto;
    }
    .jd-toggle {
      background: none;
      border: none;
      color: var(--accent-primary);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      padding: 6px 0;
      font-family: 'Inter', sans-serif;
    }
    .jd-toggle:hover {
      text-decoration: underline;
    }

    /* Question Scores Table */
    .qs-section h4 {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .qs-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 6px;
    }
    .qs-table th {
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 4px 10px 8px;
    }
    .qs-table td {
      padding: 10px;
      font-size: 13px;
      background: var(--bg-secondary);
      color: var(--text-primary);
    }
    .qs-table tr td:first-child {
      border-radius: 8px 0 0 8px;
      font-weight: 600;
      color: var(--text-secondary);
      width: 50px;
      text-align: center;
    }
    .qs-table tr td:last-child {
      border-radius: 0 8px 8px 0;
      text-align: center;
      width: 70px;
    }
    .qs-table tr td:nth-child(2) {
      max-width: 350px;
      line-height: 1.4;
    }
    .qs-score {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 13px;
    }
    .no-qs-data {
      color: var(--text-muted);
      font-size: 13px;
      font-style: italic;
      padding: 8px 0;
    }
    
    @media (max-width: 768px) {
      .session-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }
      .session-action {
        width: 100%;
        display: flex;
        justify-content: flex-end;
      }
      .qs-table th:nth-child(2),
      .qs-table td:nth-child(2) {
        max-width: 180px;
      }
    }
  </style>
</head>
<body style="display: none;">

  <div class="container page-load">
    <nav class="navbar" style="margin-bottom: 24px; padding: 12px 0;">
      <a href="home.html" class="nav-brand" style="font-size: 20px;">
        <i class="ti ti-arrow-left"></i> 🪞 Mirror AI
      </a>
      <div class="nav-actions">
        <button class="theme-toggle" id="theme-btn" style="background:transparent; border:none; color:var(--text-secondary); cursor:pointer; font-size:24px; display:flex; align-items:center; justify-content:center;">
          <i class="ti ti-moon" id="theme-icon"></i>
        </button>
        <div class="avatar" id="logout-btn" style="cursor: pointer;" title="Logout">
          JS
        </div>
      </div>
    </nav>

    <main class="dashboard-grid">
      
      <div class="flex justify-between items-center">
        <h1 class="space-grotesk" style="font-size: 32px;">Dashboard</h1>
      </div>

      <!-- Stats Row -->
      <div class="stats-row">
        <div class="card stat-card">
          <div class="stat-label">Total Sessions</div>
          <div class="stat-value space-grotesk" id="total-interviews">0</div>
          <div class="stat-change text-up"><i class="ti ti-arrow-up-right"></i> Tracked</div>
        </div>
        <div class="card stat-card">
          <div class="stat-label">Avg Score</div>
          <div class="stat-value space-grotesk text-accent" id="avg-score">0<span style="font-size: 18px; color: var(--text-muted);">/10</span></div>
          <div class="stat-change text-secondary">Overall</div>
        </div>
        <div class="card stat-card">
          <div class="stat-label">Improvement</div>
          <div class="stat-value space-grotesk text-success">+-- pts</div>
          <div class="stat-change text-secondary">Last 30 days</div>
        </div>
        <div class="card stat-card">
          <div class="stat-label">Peers Met</div>
          <div class="stat-value space-grotesk">0</div>
          <div class="stat-change text-secondary">This month</div>
        </div>
      </div>

      <!-- Middle Row -->
      <div class="middle-row">
        <!-- Chart -->
        <div class="card">
          <h3 class="space-grotesk mb-6" style="font-size: 18px;">Score Trend</h3>
          <div class="chart-container">
            <canvas id="scoreChart"></canvas>
          </div>
        </div>
        
        <!-- Weak Areas -->
        <div class="card">
          <h3 class="space-grotesk mb-6" style="font-size: 18px;">Weak Areas</h3>
          <div class="weak-areas" id="weak-areas">
            <!-- Populated dynamically -->
            <div class="area-item">
              <div class="area-label">
                <span class="text-secondary">Loading...</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Recent Sessions Row -->
      <div class="card" style="margin-bottom: 40px;">
        <h3 class="space-grotesk mb-6" style="font-size: 18px;">Recent Interviews</h3>
        <div class="session-list" id="recent-sessions">
          <p style="color: var(--text-muted)">Loading recent sessions...</p>
        </div>
      </div>

    </main>
  </div>

  <div class="mobile-nav">
    <a href="home.html"><i class="ti ti-home" style="font-size: 24px;"></i> Home</a>
    <a href="mock.html"><i class="ti ti-robot" style="font-size: 24px;"></i> AI Mock</a>
    <a href="peer.html"><i class="ti ti-users" style="font-size: 24px;"></i> Peer</a>
    <a href="dashboard.html" class="active"><i class="ti ti-layout-dashboard" style="font-size: 24px;"></i> Dash</a>
  </div>

  <script type="module">
    import { auth, db, collection, query, where, getDocs, onAuthStateChanged, signOut } from './firebase-config.js';

    // Theme initialization
    const root = document.documentElement;
    const icon = document.getElementById('theme-icon');
    function applyTheme(t) {
      root.setAttribute('data-theme', t);
      icon.className = t === 'dark' ? 'ti ti-sun' : 'ti ti-moon';
      localStorage.setItem('mirrorTheme', t);
    }
    applyTheme(localStorage.getItem('mirrorTheme') || 'light');
    document.getElementById('theme-btn').addEventListener('click', () => {
      applyTheme(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });

    let scoreChartInstance = null;

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        document.body.style.display = 'block';
        await loadDashboardData(user.uid);
      } else {
        window.location.href = 'index.html'; 
      }
    });

    document.getElementById('logout-btn').addEventListener('click', async (e) => {
      e.preventDefault();
      if (confirm("Are you sure you want to logout? \nClick OK to logout, or Cancel to stay.")) {
        await signOut(auth);
      }
    });

    async function loadDashboardData(uid) {
      console.log('Loading dashboard for UID:', uid);
      try {
        const q = query(
          collection(db, 'interviews'),
          where('userId', '==', uid)
        ); 
        
        const querySnapshot = await getDocs(q);
        console.log('Firestore returned', querySnapshot.size, 'documents');
        const interviews = [];
        querySnapshot.forEach((doc) => {
          const data = doc.data();
          console.log('Interview doc:', doc.id, data);
          interviews.push({ id: doc.id, ...data });
        });
        
        interviews.sort((a, b) => new Date(b.date) - new Date(a.date));
        
        const total = interviews.length;
        document.getElementById('total-interviews').innerText = total;
        
        if (total === 0) {
          document.getElementById('avg-score').innerHTML = `0<span style="font-size: 18px; color: var(--text-muted);">/10</span>`;
          document.getElementById('weak-areas').innerHTML = `<div class="text-secondary">No data yet. Complete an interview first!</div>`;
          document.getElementById('recent-sessions').innerHTML = `<p style="color: var(--text-muted)">No sessions found. Do a mock interview!</p>`;
          renderChart([], []);
          return;
        }

        let totalScore = 0;
        const labels = [];
        const dataPoints = [];
        let sessionsHtml = '';
        const weakAreasMap = {}; 
        
        const chartInterviews = [...interviews].reverse();
        
        chartInterviews.forEach((inv, index) => {
          labels.push(`Session ${index + 1}`);
          dataPoints.push(inv.overall_score || 0);
        });

        interviews.forEach((inv, index) => {
          totalScore += inv.overall_score || 0;
          if (inv.weakest_area) {
            weakAreasMap[inv.weakest_area] = (weakAreasMap[inv.weakest_area] || 0) + 1;
          }
          
          const d = new Date(inv.date);
          const dateStr = d.toLocaleDateString();
          const score = inv.overall_score || 0;
          const scoreClass = score >= 7 ? 'score-high' : score >= 4 ? 'score-mid' : 'score-low';
          
          // Build question-wise scores table
          let qsHtml = '';
          const qs = inv.question_scores || [];
          if (qs.length > 0) {
            qsHtml = `<table class="qs-table">
              <thead><tr><th>#</th><th>Question</th><th>Score</th></tr></thead>
              <tbody>`;
            qs.forEach(q => {
              const qScore = q.score || 0;
              const qClass = qScore >= 7 ? 'score-high' : qScore >= 4 ? 'score-mid' : 'score-low';
              const questionText = (q.question || '').length > 120 
                ? q.question.substring(0, 120) + '…' 
                : (q.question || 'N/A');
              qsHtml += `<tr>
                <td>Q${q.qNum || '?'}</td>
                <td>${questionText}</td>
                <td><span class="qs-score ${qClass}">${qScore}/10</span></td>
              </tr>`;
            });
            qsHtml += `</tbody></table>`;
          } else {
            qsHtml = `<p class="no-qs-data">Question-wise scores not available for this session.</p>`;
          }

          // Build JD section
          const jdText = inv.jd_text || '';
          const jdSection = jdText 
            ? `<div class="jd-section">
                <h4><i class="ti ti-file-description"></i> Job Description</h4>
                <div class="jd-text" id="jd-${inv.id}">${jdText}</div>
                <button class="jd-toggle" onclick="toggleJD('${inv.id}')">
                  ${jdText.length > 150 ? 'View Full JD ▼' : ''}
                </button>
              </div>`
            : `<div class="jd-section">
                <h4><i class="ti ti-file-description"></i> Job Description</h4>
                <p class="no-qs-data">JD not saved for this session.</p>
              </div>`;
          
          sessionsHtml += `
            <div class="session-card">
              <div class="session-item" onclick="toggleDetail('detail-${inv.id}', this)">
                <div class="session-info">
                  <div class="session-icon">🤖</div>
                  <div>
                    <div class="session-title">${inv.role || 'Interview'}</div>
                    <div class="session-meta">
                      <span class="score-badge ${scoreClass}">Score: ${score}/10</span>
                      <span><i class="ti ti-calendar"></i> ${dateStr}</span>
                      <span><i class="ti ti-list-check"></i> ${qs.length} Qs</span>
                    </div>
                  </div>
                </div>
                <div class="session-action">
                  <button class="btn-expand" title="View Details"><i class="ti ti-chevron-down"></i></button>
                </div>
              </div>
              <div class="session-detail" id="detail-${inv.id}">
                <div class="session-detail-inner">
                  ${jdSection}
                  <div class="qs-section">
                    <h4><i class="ti ti-chart-bar"></i> Question-wise Scores</h4>
                    ${qsHtml}
                  </div>
                </div>
              </div>
            </div>
          `;
        });
        
        const avg = (totalScore / total).toFixed(1);
        document.getElementById('avg-score').innerHTML = `${avg}<span style="font-size: 18px; color: var(--text-muted);">/10</span>`;
        document.getElementById('recent-sessions').innerHTML = sessionsHtml;
        
        // Render weak areas with my new progress bars format
        const sortedWeakAreas = Object.entries(weakAreasMap).sort((a,b) => b[1] - a[1]);
        let weakAreasHtml = '';
        const colors = ['text-danger', 'text-warning', 'text-primary'];
        const fillColors = ['fill-low', 'fill-mid', 'fill-high'];

        sortedWeakAreas.slice(0, 3).forEach(([area, count], idx) => {
          // Fake percentage based on rank
          const fakePct = 100 - (idx * 20);
          weakAreasHtml += `
            <div class="area-item">
              <div class="area-label">
                <span class="${colors[idx]}">${area}</span>
                <span class="mono text-muted">Frequency: ${count}</span>
              </div>
              <div class="progress-track"><div class="progress-fill ${fillColors[idx]}" style="width: ${fakePct}%;"></div></div>
            </div>
          `;
        });
        
        document.getElementById('weak-areas').innerHTML = weakAreasHtml || `<div class="text-secondary">None recorded</div>`;
        
        renderChart(labels, dataPoints);
        
      } catch (error) {
        console.error("Error loading data:", error);
        // If it's a missing index error, Firestore provides a direct link to create it
        const errMsg = error.message || String(error);
        if (errMsg.includes('index')) {
          document.getElementById('recent-sessions').innerHTML = `<p style="color: var(--error)">Firestore needs an index. Check browser console for the creation link.</p>`;
        } else {
          document.getElementById('recent-sessions').innerHTML = `<p style="color: var(--error)">Error: ${errMsg}</p>`;
        }
      }
    }

    // Toggle detail panel
    window.toggleDetail = function(id, headerEl) {
      const detail = document.getElementById(id);
      const btn = headerEl.querySelector('.btn-expand');
      detail.classList.toggle('open');
      if (btn) btn.classList.toggle('open');
    };

    // Toggle JD text expand
    window.toggleJD = function(docId) {
      const jdEl = document.getElementById('jd-' + docId);
      const btn = jdEl.nextElementSibling;
      jdEl.classList.toggle('expanded');
      btn.textContent = jdEl.classList.contains('expanded') ? 'Collapse ▲' : 'View Full JD ▼';
    };

    function renderChart(labels, dataPoints) {
      const ctx = document.getElementById('scoreChart').getContext('2d');
      if (scoreChartInstance) scoreChartInstance.destroy();
      
      let gradient = ctx.createLinearGradient(0, 0, 0, 400);
      gradient.addColorStop(0, 'rgba(0, 217, 255, 0.5)');
      gradient.addColorStop(1, 'rgba(0, 217, 255, 0)');

      scoreChartInstance = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: 'Avg Score',
            data: dataPoints,
            borderColor: '#00D9FF',
            backgroundColor: gradient,
            borderWidth: 3,
            pointBackgroundColor: '#111827',
            pointBorderColor: '#00D9FF',
            pointBorderWidth: 2,
            pointRadius: 4,
            pointHoverRadius: 6,
            fill: true,
            tension: 0.4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#111827',
              titleColor: '#F9FAFB',
              bodyColor: '#00D9FF',
              borderColor: '#1F2937',
              borderWidth: 1,
              padding: 12,
              displayColors: false
            }
          },
          scales: {
            x: {
              grid: { display: false, drawBorder: false },
              ticks: { color: '#9CA3AF', font: { family: 'Inter' } }
            },
            y: {
              grid: { color: '#1F2937', drawBorder: false },
              ticks: { color: '#9CA3AF', font: { family: 'Inter' } },
              min: 0,
              max: 10
            }
          },
          interaction: { intersect: false, mode: 'index' },
        }
      });
    }
  </script>
</body>
</html>
