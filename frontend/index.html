<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mirror AI - Interview Practice</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    .index-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
    }
    .hero-title {
      font-size: 48px;
      margin: 16px 0;
      color: white;
    }
    .hero-subtitle {
      color: var(--text-secondary);
      font-size: 16px;
      max-width: 320px;
      margin: 0 auto 40px auto;
      line-height: 1.6;
    }
    .google-btn {
      background: white;
      color: #080B14;
      border: none;
      border-radius: 10px;
      padding: 12px 28px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }
    .google-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
    }
    .mirror-icon {
      font-size: 48px;
    }
    .student-count {
      margin-top: 24px;
      font-size: 12px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-gradient-spot"></div>

  <div class="index-container page-load">
    <div class="mirror-icon">🪞</div>
    <h1 class="hero-title space-grotesk text-glow-primary">Mirror AI</h1>
    <p class="hero-subtitle">
      "Pehli baar interview mein jaane se pehle —<br>
      hazaar baar practice karo"
    </p>

    <form id="auth-form" style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; width: 100%; max-width: 320px;">
      <input type="email" id="email-input" placeholder="Email Address" required style="padding: 12px; border-radius: 8px; border: 1px solid #333; background: #1a1f2e; color: white; outline: none; font-family: inherit;">
      <input type="password" id="password-input" placeholder="Password" required style="padding: 12px; border-radius: 8px; border: 1px solid #333; background: #1a1f2e; color: white; outline: none; font-family: inherit;">
      <div style="display: flex; gap: 10px; justify-content: center; margin-top: 8px;">
        <button type="submit" id="login-btn" style="flex: 1; background: #3b82f6; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; font-family: inherit;">Login</button>
        <button type="button" id="signup-btn" style="flex: 1; background: transparent; color: #3b82f6; border: 1px solid #3b82f6; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; font-family: inherit;">Sign Up</button>
      </div>
    </form>
    
    <div style="color: #64748b; margin-bottom: 20px; font-size: 14px;">OR</div>

    <button id="google-login-btn" class="google-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>
    <div id="error-msg" style="color: #ef4444; margin-top: 1rem; display: none;"></div>

    <div class="student-count">Used by 2,400+ students</div>
  </div>

  <script type="module">
    import { auth, provider, signInWithPopup, db, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword } from './firebase-config.js';
    import { doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const errorMsg = document.getElementById('error-msg');
    
    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = 'home.html';
      }
    });

    async function saveUserToFirestore(user, nameStr) {
      const userRef = doc(db, 'users', user.uid);
      const userSnap = await getDoc(userRef);
      if (!userSnap.exists()) {
        await setDoc(userRef, {
          name: nameStr || user.email.split('@')[0],
          email: user.email,
          createdAt: new Date()
        });
      }
    }

    document.getElementById('auth-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email-input').value;
      const password = document.getElementById('password-input').value;
      try {
        errorMsg.style.display = 'none';
        const result = await signInWithEmailAndPassword(auth, email, password);
        await saveUserToFirestore(result.user, result.user.email.split('@')[0]);
      } catch (error) {
        console.error("Login error:", error);
        errorMsg.innerText = error.message;
        errorMsg.style.display = 'block';
      }
    });

    document.getElementById('signup-btn').addEventListener('click', async () => {
      const email = document.getElementById('email-input').value;
      const password = document.getElementById('password-input').value;
      if (!email || !password) {
        errorMsg.innerText = "Please enter email and password to sign up";
        errorMsg.style.display = 'block';
        return;
      }
      try {
        errorMsg.style.display = 'none';
        const result = await createUserWithEmailAndPassword(auth, email, password);
        await saveUserToFirestore(result.user, result.user.email.split('@')[0]);
      } catch (error) {
        console.error("Signup error:", error);
        errorMsg.innerText = error.message;
        errorMsg.style.display = 'block';
      }
    });

    document.getElementById('google-login-btn').addEventListener('click', async () => {
      try {
        errorMsg.style.display = 'none';
        const result = await signInWithPopup(auth, provider);
        await saveUserToFirestore(result.user, result.user.displayName);
      } catch (error) {
        console.error("Google Login error:", error);
        if (error.code === 'auth/popup-blocked') {
          errorMsg.innerText = "Popup blocked. Please allow popups for this site.";
        } else if (error.code === 'auth/unauthorized-domain') {
          errorMsg.innerText = "Domain not authorized in Firebase. Are you running from file://? Please use a local server.";
        } else {
          errorMsg.innerText = error.message;
        }
        errorMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
