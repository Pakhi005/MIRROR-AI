<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mirror AI - Peer Connect</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/@daily-co/daily-js"></script>
  <style>
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .online-count {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 500;
    }

    .filters {
      display: flex;
      gap: 16px;
    }

    .select-dropdown {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 10px 16px;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      outline: none;
      cursor: pointer;
    }

    .peer-grid {
      display: grid;
      gap: 24px;
      grid-template-columns: repeat(1, 1fr);
    }

    @media (min-width: 768px) {
      .peer-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 1024px) {
      .peer-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .user-card {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .user-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .peer-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 600;
      color: var(--accent-secondary);
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-secondary);
      background: rgba(0, 255, 148, 0.1);
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(0, 255, 148, 0.2);
    }

    .user-name {
      font-size: 18px;
      font-weight: 600;
      color: white;
      margin-bottom: 4px;
    }

    .user-degree {
      color: var(--text-secondary);
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="container page-load">
    <nav class="navbar" style="margin-bottom: 24px; padding: 12px 0;">
      <a href="home.html" class="nav-brand" style="font-size: 20px;">
        <i class="ti ti-arrow-left"></i> 🪞 Mirror AI
      </a>
      <div class="nav-actions">
        <a href="dashboard.html" class="text-secondary hover:text-white" style="text-decoration: none;">
          <i class="ti ti-layout-dashboard" style="font-size: 24px;"></i>
        </a>
        <div class="avatar">JS</div>
      </div>
    </nav>

    <main id="main-content">
      <h1 class="space-grotesk" style="font-size: 32px; margin-bottom: 24px;">Peer Connect</h1>

      <div class="top-bar">
        <div class="online-count text-primary">
          <span class="online-dot"></span> <span id="online-count">0</span> people online now
        </div>
        <div class="filters">
          <select class="select-dropdown">
            <option>All Domains</option>
            <option>Web Dev</option>
            <option>Data Science</option>
            <option>AI/ML</option>
          </select>
          <button class="btn btn-secondary"><i class="ti ti-dice-5"></i> Random Match</button>
        </div>
      </div>

      <div class="peer-grid" id="user-grid">
        <!-- Live users will be rendered here dynamically -->
      </div>
    </main>

    <!-- Video Call UI -->
    <div id="video-container" style="display: none; flex-direction: column; height: calc(100vh - 140px);">
      <div class="flex justify-between items-center mb-4">
        <h2 class="space-grotesk">In Call with <span id="peer-name">Peer</span></h2>
        <div class="badge badge-danger text-lg" id="call-timer" style="font-size: 18px; padding: 6px 16px;">30:00</div>
      </div>

      <div id="daily-container" style="flex: 1; border-radius: 16px; overflow: hidden; box-shadow: var(--shadow-md); background: #000; position: relative;">
        <!-- Daily.co will mount here -->
      </div>
    </div>

    <!-- Connect Modal -->
    <div class="modal-overlay" id="request-overlay" style="display: none;">
      <div class="modal-content" id="request-modal">
        <h3 class="space-grotesk" style="font-size: 24px; text-align: center; margin-bottom: 24px;" id="request-text">
          User wants to connect!</h3>
        <p class="text-secondary text-center mb-6">They are inviting you to a practice session.</p>

        <div class="flex flex-col gap-4 mb-6">
          <label class="flex items-center gap-2 text-primary"
            style="padding: 12px; background: var(--bg-secondary); border-radius: 8px; border: 1px solid var(--accent-primary); cursor: pointer;">
            <input type="radio" name="activity" checked> Mock interview practice
          </label>
        </div>

        <div class="flex justify-between items-center mb-6">
          <span class="text-secondary"><i class="ti ti-clock"></i> Session: 30:00 minutes</span>
        </div>

        <div class="flex gap-4">
          <button class="btn btn-secondary" style="width: 100%;" onclick="declineRequest()">Decline</button>
          <button class="btn btn-primary" style="width: 100%;" onclick="acceptRequest()">Accept</button>
        </div>
      </div>
    </div>
  </div>

  <div class="mobile-nav">
    <a href="home.html"><i class="ti ti-home" style="font-size: 24px;"></i> Home</a>
    <a href="mock.html"><i class="ti ti-robot" style="font-size: 24px;"></i> AI Mock</a>
    <a href="peer.html" class="active"><i class="ti ti-users" style="font-size: 24px;"></i> Peer</a>
    <a href="dashboard.html"><i class="ti ti-layout-dashboard" style="font-size: 24px;"></i> Dash</a>
  </div>

  <script type="module">
    import { auth, db, onAuthStateChanged } from './firebase-config.js';
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 🔴 IMPORTANT: REPLACE THESE WITH YOUR SUPABASE CREDENTIALS 🔴
    const SUPABASE_URL = "https://tuexeruyxwywpuomkpui.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_lmrZTlw-xknTBkB6xkCi7g_CxV2FG2Y";



    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let channel;

    let myName = "Guest " + Math.floor(Math.random() * 1000);
    let myDomain = "Software Engineering";
    let myYear = "Demo User";
    function uuidv4() {
      if (typeof crypto !== 'undefined' && crypto.randomUUID) {
        return crypto.randomUUID();
      }
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
        var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    }

    let myUuid = uuidv4();
    let mySessionId = uuidv4();

    let pendingRequestSessionId = null;
    let peerNameFromReq = "Peer";
    let targetPeerName = "Peer";

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        myUuid = user.uid; // use firebase uid for consistency
        const userDoc = await getDoc(doc(db, 'users', user.uid));
        if (userDoc.exists()) {
          myName = userDoc.data().name || user.email.split('@')[0];
        } else {
          myName = user.email.split('@')[0];
        }
      }
      initSupabasePresence();
    });

    // Fallback if auth is slow or anonymous
    setTimeout(() => {
      if (!channel) initSupabasePresence();
    }, 2000);

    function initSupabasePresence() {
      if (channel) return; // already initialized

      channel = supabaseClient.channel('mirror-ai-peer-room', {
        config: {
          presence: { key: mySessionId }
        }
      });

      channel
        .on('presence', { event: 'sync' }, () => {
          updateUserList();
        })
        .on('presence', { event: 'join' }, () => {
          updateUserList();
        })
        .on('presence', { event: 'leave' }, () => {
          updateUserList();
        })
        .on('broadcast', { event: 'connect-request' }, (payload) => {
          if (payload.payload.targetSessionId === mySessionId) {
            pendingRequestSessionId = payload.payload.fromSessionId;
            peerNameFromReq = payload.payload.fromName;
            document.getElementById('request-text').innerText = `${payload.payload.fromName} wants to connect!`;
            document.getElementById('request-overlay').style.display = 'flex';
          }
        })
        .on('broadcast', { event: 'connect-declined' }, (payload) => {
          if (payload.payload.targetSessionId === mySessionId) alert("Your request was declined.");
        })
        .on('broadcast', { event: 'connect-accepted' }, (payload) => {
          if (payload.payload.targetSessionId === mySessionId) handleRequestAccepted(payload.payload.fromSessionId);
        })
        .on('broadcast', { event: 'call-ended' }, (payload) => {
          if (payload.payload.targetSessionId === mySessionId) window.endCall(false);
        })
        .subscribe(async (status) => {
          if (status === 'SUBSCRIBED') {
            await channel.track({
              userId: myUuid,
              sessionId: mySessionId,
              name: myName,
              domain: myDomain,
              year: myYear
            });
          }
        });
    }

    function updateUserList() {
      if (!channel) return;
      const state = channel.presenceState();
      const users = [];
      for (const key in state) {
        state[key].forEach(presence => {
          // Exclude our own session
          if (presence.sessionId && presence.sessionId !== mySessionId) {
            users.push(presence);
          } else if (!presence.sessionId && presence.userId && presence.userId !== myUuid) {
            users.push(presence);
          }
        });
      }
      renderOnlineUsers(users);
    }

    function renderOnlineUsers(users) {
      document.getElementById('online-count').innerText = users.length;
      const grid = document.getElementById('user-grid');
      grid.innerHTML = '';

      users.forEach((user, index) => {
        const initials = user.name.substring(0, 2).toUpperCase();
        const colors = ['var(--accent-primary)', 'var(--accent-secondary)', 'var(--accent-danger)'];
        const badgeColors = ['badge-primary', 'badge-secondary', 'badge-danger'];
        const cIndex = index % colors.length;

        const card = document.createElement('div');
        card.className = 'card interactive peer-card user-card';
        card.innerHTML = `
          <div class="user-header">
            <div class="user-info">
              <div class="peer-avatar" style="color: ${colors[cIndex]}">${initials}</div>
              <div>
                <div class="status-badge"><span class="online-dot" style="width: 6px; height: 6px;"></span> Online</div>
              </div>
            </div>
          </div>
          <div>
            <div class="user-name space-grotesk">${user.name}</div>
            <div class="user-degree">${user.year}</div>
          </div>
          <div>
            <span class="badge ${badgeColors[cIndex]}">${user.domain}</span>
          </div>
          <button class="btn btn-secondary" style="width: 100%; justify-content: space-between;" onclick="connectPeer('${user.sessionId}', '${user.name.replace(/'/g, "\\'")}')">
            Connect <i class="ti ti-arrow-right"></i>
          </button>
        `;
        grid.appendChild(card);
      });
    }

    window.connectPeer = function (targetSessionId, peerName) {
      targetPeerName = peerName;
      alert("Request sent to " + peerName + "! Waiting for response...");
      channel.send({
        type: 'broadcast',
        event: 'connect-request',
        payload: {
          targetSessionId,
          fromSessionId: mySessionId,
          fromName: myName,
          fromDomain: myDomain
        }
      });
    }

    window.declineRequest = function () {
      if (pendingRequestSessionId) {
        channel.send({
          type: 'broadcast',
          event: 'connect-declined',
          payload: { targetSessionId: pendingRequestSessionId }
        });
      }
      pendingRequestSessionId = null;
      document.getElementById('request-overlay').style.display = 'none';
    }

    // --- Daily.co Call Logic ---
    let currentPeerSessionId = null;
    let timerInterval;
    let dailyCallFrame = null;

    // 🔴 DAILY.CO BASE URL — replace with your Daily.co domain if you have one
    // Rooms are auto-created with a unique name per call pair.
    // Using Daily.co's demo/staging environment (works without API key):
    const DAILY_DOMAIN = 'https://mirrorai.daily.co';

    function startTimer() {
      let timeLeft = 30 * 60;
      const timerEl = document.getElementById('call-timer');
      timerEl.innerText = "30:00";
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
        const s = (timeLeft % 60).toString().padStart(2, '0');
        timerEl.innerText = `${m}:${s}`;
        if (timeLeft <= 0) window.endCall();
      }, 1000);
    }

    function startDailyCall(targetSessionId) {
      document.getElementById('main-content').style.display = 'none';
      document.getElementById('video-container').style.display = 'flex';

      // Generate a deterministic, shared room name from both session IDs
      const roomName = 'mirror-' + [mySessionId, targetSessionId].sort().join('').replace(/-/g, '').substring(0, 40);
      const roomUrl = `${DAILY_DOMAIN}/${roomName}`;

      const container = document.getElementById('daily-container');
      container.innerHTML = '';

      dailyCallFrame = window.DailyIframe.createFrame(container, {
        iframeStyle: {
          position: 'absolute',
          top: 0,
          left: 0,
          width: '100%',
          height: '100%',
          border: 'none',
          borderRadius: '16px'
        },
        showLeaveButton: true,
        showFullscreenButton: true,
      });

      dailyCallFrame
        .join({ url: roomUrl, userName: myName })
        .catch(err => {
          console.error('Daily.co join error:', err);
          alert('Could not join the call: ' + err.message);
          window.endCall(false);
        });

      dailyCallFrame.on('left-meeting', () => window.endCall(true));
      dailyCallFrame.on('error', (e) => {
        console.error('Daily.co error:', e);
        alert('Call error: ' + (e.errorMsg || JSON.stringify(e)));
        window.endCall(false);
      });

      startTimer();
    }

    // Callee accepts
    window.acceptRequest = async function () {
      document.getElementById('request-overlay').style.display = 'none';
      currentPeerSessionId = pendingRequestSessionId;
      document.getElementById('peer-name').innerText = peerNameFromReq;

      channel.send({
        type: 'broadcast',
        event: 'connect-accepted',
        payload: {
          targetSessionId: currentPeerSessionId,
          fromSessionId: mySessionId
        }
      });
      
      startDailyCall(currentPeerSessionId);
    }

    // Caller receives acceptance
    async function handleRequestAccepted(fromSessionId) {
      alert("Request Accepted! Joining call...");
      currentPeerSessionId = fromSessionId;
      document.getElementById('peer-name').innerText = targetPeerName;
      
      startDailyCall(currentPeerSessionId);
    }

    window.endCall = async function (notify = true) {
      if (notify && currentPeerSessionId) {
        channel.send({
          type: 'broadcast',
          event: 'call-ended',
          payload: { targetSessionId: currentPeerSessionId }
        });
      }
      if (dailyCallFrame) {
        dailyCallFrame.destroy();
        dailyCallFrame = null;
      }
      document.getElementById('daily-container').innerHTML = '';
      document.getElementById('video-container').style.display = 'none';
      document.getElementById('main-content').style.display = 'block';
      clearInterval(timerInterval);
      document.getElementById('call-timer').innerText = "30:00";
      currentPeerSessionId = null;
    }

    function startTimer() {
      let timeLeft = 30 * 60;
      const timerEl = document.getElementById('call-timer');
      timerEl.innerText = "30:00";
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
        const s = (timeLeft % 60).toString().padStart(2, '0');
        timerEl.innerText = `${m}:${s}`;
        if (timeLeft <= 0) {
          window.endCall();
        }
      }, 1000);
    }
  </script>
</body>

</html>
