<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mirror AI - Peer Connect</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 16px;
    }
    .online-count {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 500;
    }
    .filters {
      display: flex;
      gap: 16px;
    }

    .select-dropdown {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 10px 16px;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      outline: none;
      cursor: pointer;
    }

    .peer-grid {
      display: grid;
      gap: 24px;
      grid-template-columns: repeat(1, 1fr);
    }
    @media (min-width: 768px) {
      .peer-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (min-width: 1024px) {
      .peer-grid { grid-template-columns: repeat(3, 1fr); }
    }

    .user-card {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .user-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .peer-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 600;
      color: var(--accent-secondary);
    }
    
    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-secondary);
      background: rgba(0, 255, 148, 0.1);
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(0, 255, 148, 0.2);
    }

    .user-name {
      font-size: 18px;
      font-weight: 600;
      color: white;
      margin-bottom: 4px;
    }
    
    .user-degree {
      color: var(--text-secondary);
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="container page-load">
    <nav class="navbar" style="margin-bottom: 24px; padding: 12px 0;">
      <a href="home.html" class="nav-brand" style="font-size: 20px;">
        <i class="ti ti-arrow-left"></i> 🪞 Mirror AI
      </a>
      <div class="nav-actions">
        <a href="dashboard.html" class="text-secondary hover:text-white" style="text-decoration: none;">
          <i class="ti ti-layout-dashboard" style="font-size: 24px;"></i>
        </a>
        <div class="avatar">JS</div>
      </div>
    </nav>

    <main>
      <h1 class="space-grotesk" style="font-size: 32px; margin-bottom: 24px;">Peer Connect</h1>
      
      <div class="top-bar">
        <div class="online-count text-primary">
          <span class="online-dot"></span> <span id="online-count">0</span> people online now
        </div>
        <div class="filters">
          <select class="select-dropdown">
            <option>All Domains</option>
            <option>Web Dev</option>
            <option>Data Science</option>
            <option>AI/ML</option>
          </select>
          <button class="btn btn-secondary"><i class="ti ti-dice-5"></i> Random Match</button>
        </div>
      </div>

      <div class="peer-grid" id="user-grid">
        <!-- Live users will be rendered here dynamically -->
      </div>
    </main>

    <!-- Connect Modal -->
    <div class="modal-overlay" id="request-overlay" style="display: none;">
      <div class="modal-content" id="request-modal">
        <h3 class="space-grotesk" style="font-size: 24px; text-align: center; margin-bottom: 24px;" id="request-text">User wants to connect!</h3>
        <p class="text-secondary text-center mb-6">They are inviting you to a practice session.</p>
        
        <div class="flex flex-col gap-4 mb-6">
          <label class="flex items-center gap-2 text-primary" style="padding: 12px; background: var(--bg-secondary); border-radius: 8px; border: 1px solid var(--accent-primary); cursor: pointer;">
            <input type="radio" name="activity" checked> Mock interview practice
          </label>
        </div>

        <div class="flex justify-between items-center mb-6">
          <span class="text-secondary"><i class="ti ti-clock"></i> Session: 30:00 minutes</span>
        </div>
        
        <div class="flex gap-4">
          <button class="btn btn-secondary" style="width: 100%;" onclick="declineRequest()">Decline</button>
          <button class="btn btn-primary" style="width: 100%;" onclick="acceptRequest()">Accept</button>
        </div>
      </div>
    </div>
  </div>

  <div class="mobile-nav">
    <a href="home.html"><i class="ti ti-home" style="font-size: 24px;"></i> Home</a>
    <a href="mock.html"><i class="ti ti-robot" style="font-size: 24px;"></i> AI Mock</a>
    <a href="peer.html" class="active"><i class="ti ti-users" style="font-size: 24px;"></i> Peer</a>
    <a href="dashboard.html"><i class="ti ti-layout-dashboard" style="font-size: 24px;"></i> Dash</a>
  </div>

  <script>
    let myName = prompt("Enter your name for the session:", "Guest " + Math.floor(Math.random() * 1000));
    if (!myName) myName = "Anonymous";
    
    let myDomain = prompt("Enter your domain (e.g., WebDev, AIML):", "Software Engineering");
    if (!myDomain) myDomain = "Tech";

    let myYear = "Demo User";
    let pendingRequestSocketId = null;

    const socket = io('http://localhost:3000');

    socket.on('connect', () => {
      console.log("Connected to Socket.io server");
      socket.emit('join', {
        name: myName,
        domain: myDomain,
        year: myYear
      });
    });

    socket.on('online-users', (users) => {
      document.getElementById('online-count').innerText = users.length;
      
      const grid = document.getElementById('user-grid');
      grid.innerHTML = ''; 

      users.forEach((user, index) => {
        if (user.socketId === socket.id) return;

        const initials = user.name.substring(0, 2).toUpperCase();
        const colors = ['var(--accent-primary)', 'var(--accent-secondary)', 'var(--accent-danger)'];
        const badgeColors = ['badge-primary', 'badge-secondary', 'badge-danger'];
        const cIndex = index % colors.length;
        
        const card = document.createElement('div');
        card.className = 'card interactive peer-card user-card';
        card.innerHTML = `
          <div class="user-header">
            <div class="user-info">
              <div class="peer-avatar" style="color: ${colors[cIndex]}">${initials}</div>
              <div>
                <div class="status-badge"><span class="online-dot" style="width: 6px; height: 6px;"></span> Online</div>
              </div>
            </div>
          </div>
          <div>
            <div class="user-name space-grotesk">${user.name}</div>
            <div class="user-degree">${user.year}</div>
          </div>
          <div>
            <span class="badge ${badgeColors[cIndex]}">${user.domain}</span>
          </div>
          <button class="btn btn-secondary" style="width: 100%; justify-content: space-between;" onclick="connectPeer('${user.socketId}')">
            Connect <i class="ti ti-arrow-right"></i>
          </button>
        `;
        grid.appendChild(card);
      });
    });

    function connectPeer(targetSocketId) {
      alert("Request sent! Waiting for response...");
      socket.emit('connect-request', {
        targetSocketId,
        fromName: myName,
        fromDomain: myDomain
      });
    }

    socket.on('receive-request', (data) => {
      const { fromSocketId, fromName, fromDomain } = data;
      pendingRequestSocketId = fromSocketId;
      document.getElementById('request-text').innerText = `${fromName} wants to connect!`;
      document.getElementById('request-overlay').style.display = 'flex';
    });

    function declineRequest() {
      pendingRequestSocketId = null;
      document.getElementById('request-overlay').style.display = 'none';
    }

    async function acceptRequest() {
      document.getElementById('request-overlay').style.display = 'none';
      
      try {
        const response = await fetch('http://localhost:3000/create-room', { method: 'POST' });
        const roomData = await response.json();
        const roomUrl = roomData.url;
        
        socket.emit('connect-accepted', {
          targetSocketId: pendingRequestSocketId,
          roomUrl: roomUrl
        });
        
        joinVideoRoom(roomUrl);
      } catch (err) {
        alert("Failed to create room.");
        console.error(err);
      }
    }

    socket.on('request-accepted', (data) => {
      alert("Request Accepted! Joining room...");
      joinVideoRoom(data.roomUrl);
    });

    function joinVideoRoom(url) {
      window.open(url, "_blank");
      
      alert("A 30-minute practice session has started in a new tab! We'll ask you about it later.");
      setTimeout(() => {
        const feedback = confirm("Kya interview practice ki? (Click OK for Yes to get AI feedback)");
        if (feedback) {
           alert("Great! Feature: AI will now analyze the transcript.");
        } else {
           alert("Session ended normally.");
        }
      }, 30 * 60 * 1000); 
    }

    window.connectPeer = connectPeer;
    window.declineRequest = declineRequest;
    window.acceptRequest = acceptRequest;
  </script>
</body>
</html>
