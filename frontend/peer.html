<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mirror AI - Peer Connect</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .online-count {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 500;
    }

    .filters {
      display: flex;
      gap: 16px;
    }

    .select-dropdown {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 10px 16px;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      outline: none;
      cursor: pointer;
    }

    .peer-grid {
      display: grid;
      gap: 24px;
      grid-template-columns: repeat(1, 1fr);
    }

    @media (min-width: 768px) {
      .peer-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 1024px) {
      .peer-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .user-card {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .user-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .peer-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 600;
      color: var(--accent-secondary);
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-secondary);
      background: rgba(0, 255, 148, 0.1);
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(0, 255, 148, 0.2);
    }

    .user-name {
      font-size: 18px;
      font-weight: 600;
      color: white;
      margin-bottom: 4px;
    }

    .user-degree {
      color: var(--text-secondary);
      font-size: 14px;
    }

    .video-shell {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      flex: 1;
      min-height: 0;
    }

    .video-card {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      background: #000;
      min-height: 220px;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .video-card video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
    }

    .video-label {
      position: absolute;
      left: 12px;
      bottom: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.65);
      color: white;
      font-size: 12px;
      font-weight: 600;
    }
  </style>
</head>

<body>

  <div class="container page-load">
    <nav class="navbar" style="margin-bottom: 24px; padding: 12px 0;">
      <a href="home.html" class="nav-brand" style="font-size: 20px;">
        <i class="ti ti-arrow-left"></i> 🪞 Mirror AI
      </a>
      <div class="nav-actions">
        <a href="dashboard.html" class="text-secondary hover:text-white" style="text-decoration: none;">
          <i class="ti ti-layout-dashboard" style="font-size: 24px;"></i>
        </a>
        <div class="avatar">JS</div>
      </div>
    </nav>

    <!-- DEBUG PANEL -->
    <div id="debug-panel" style="background: rgba(99, 102, 241, 0.1); border: 1px solid rgba(99, 102, 241, 0.3); border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; font-size: 12px; font-family: monospace;">
      <div><strong>🔍 Your Session ID:</strong> <code id="session-id-display" style="color: #10b981; user-select: all;">loading...</code></div>
      <div style="margin-top: 4px;"><strong>📊 Firestore Status:</strong> <span id="firestore-status">initializing...</span></div>
    </div>

    <main id="main-content">
      <h1 class="space-grotesk" style="font-size: 32px; margin-bottom: 24px;">Peer Connect</h1>

      <div class="top-bar">
        <div class="online-count text-primary">
          <span class="online-dot"></span> <span id="online-count">0</span> people online now
        </div>
        <div id="conn-status" style="font-size: 12px; color: #facc15; padding: 4px 10px; background: rgba(250,204,21,0.1); border-radius: 999px; border: 1px solid rgba(250,204,21,0.3);">⏳ Connecting...</div>
        <div class="filters">
          <select class="select-dropdown">
            <option>All Domains</option>
            <option>Web Dev</option>
            <option>Data Science</option>
            <option>AI/ML</option>
          </select>
          <button class="btn btn-secondary"><i class="ti ti-dice-5"></i> Random Match</button>
        </div>
      </div>

      <div class="peer-grid" id="user-grid">
        <!-- Live users will be rendered here dynamically -->
      </div>
    </main>

    <!-- Video Call UI -->
    <div id="video-container" style="display: none; flex-direction: column; height: calc(100vh - 140px);">
      <div class="flex justify-between items-center mb-4">
        <h2 class="space-grotesk">In Call with <span id="peer-name">Peer</span></h2>
        <div class="badge badge-danger text-lg" id="call-timer" style="font-size: 18px; padding: 6px 16px;">30:00</div>
      </div>

      <div id="daily-container" style="flex: 1; border-radius: 16px; overflow: hidden; box-shadow: var(--shadow-md); background: #000; position: relative;">
        <!-- Daily.co will mount here -->
      </div>
    </div>

    <!-- Connect Modal -->
    <div class="modal-overlay" id="request-overlay" style="display: none;">
      <div class="modal-content" id="request-modal">
        <h3 class="space-grotesk" style="font-size: 24px; text-align: center; margin-bottom: 24px;" id="request-text">
          User wants to connect!</h3>
        <p class="text-secondary text-center mb-6">They are inviting you to a practice session.</p>

        <div class="flex flex-col gap-4 mb-6">
          <label class="flex items-center gap-2 text-primary"
            style="padding: 12px; background: var(--bg-secondary); border-radius: 8px; border: 1px solid var(--accent-primary); cursor: pointer;">
            <input type="radio" name="activity" checked> Mock interview practice
          </label>
        </div>

        <div class="flex justify-between items-center mb-6">
          <span class="text-secondary"><i class="ti ti-clock"></i> Session: 30:00 minutes</span>
        </div>

        <div class="flex gap-4">
          <button class="btn btn-secondary" style="width: 100%;" onclick="declineRequest()">Decline</button>
          <button class="btn btn-primary" style="width: 100%;" onclick="acceptRequest()">Accept</button>
        </div>
      </div>
    </div>
  </div>

  <div class="mobile-nav">
    <a href="home.html"><i class="ti ti-home" style="font-size: 24px;"></i> Home</a>
    <a href="mock.html"><i class="ti ti-robot" style="font-size: 24px;"></i> AI Mock</a>
    <a href="peer.html" class="active"><i class="ti ti-users" style="font-size: 24px;"></i> Peer</a>
    <a href="dashboard.html"><i class="ti ti-layout-dashboard" style="font-size: 24px;"></i> Dash</a>
  </div>

  <script type="module">
    import { auth, db, onAuthStateChanged } from './firebase-config.js';
    import {
      doc, getDoc, setDoc, deleteDoc, collection,
      onSnapshot, query, where, serverTimestamp, addDoc, getDocs
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    let myName = "Guest " + Math.floor(Math.random() * 1000);
    let myDomain = "Software Engineering";
    let myYear = "Demo User";
    function uuidv4() {
      if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
        var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    }

    let myUuid = uuidv4();
    let mySessionId = uuidv4();

    let pendingRequestSessionId = null;
    let pendingRoomName = null;
    let peerNameFromReq = "Peer";
    let targetPeerName = "Peer";
    let lobbyUnsubscribe = null;
    let signalUnsubscribe = null;
    const SESSION_DURATION_MINUTES = 30;

    // Display session ID on page load
    console.log('[PEER] Page loaded - Your Session ID:', mySessionId);
    const sessionIdDisplay = document.getElementById('session-id-display');
    if (sessionIdDisplay) {
      sessionIdDisplay.innerText = mySessionId;
      sessionIdDisplay.title = 'Click to copy';
      sessionIdDisplay.style.cursor = 'pointer';
      sessionIdDisplay.onclick = () => {
        navigator.clipboard.writeText(mySessionId);
        alert('Session ID copied to clipboard!');
      };
    }

    // In-memory map of online users
    const onlineUsers = {};

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        myUuid = user.uid;
        const userDoc = await getDoc(doc(db, 'users', user.uid));
        if (userDoc.exists()) {
          myName = userDoc.data().name || user.email.split('@')[0];
          myDomain = userDoc.data().domain || myDomain;
          myYear = userDoc.data().year || myYear;
        } else {
          myName = user.email.split('@')[0];
        }
      }
      initLobby();
    });

    // Fallback if auth is slow
    setTimeout(() => { if (!lobbyUnsubscribe) initLobby(); }, 2500);

    async function initLobby() {
      if (lobbyUnsubscribe) return;

      console.log('[PEER] Initializing lobby...');
      console.log('[PEER] Firebase db:', db ? 'initialized' : 'NOT INITIALIZED');

      const el = document.getElementById('conn-status');
      const fsStatus = document.getElementById('firestore-status');

      try {
        // Write ourselves into the lobby
        const myRef = doc(db, 'peer-lobby', mySessionId);
        console.log('[PEER] Writing self to lobby with sessionId:', mySessionId);
        await setDoc(myRef, {
          sessionId: mySessionId,
          userId: myUuid,
          name: myName,
          domain: myDomain,
          year: myYear,
          ts: serverTimestamp()
        });
        if (fsStatus) fsStatus.innerHTML = '<span style="color: #10b981;">✅ Connected</span>';
      } catch (err) {
        console.error('[PEER] ERROR writing to lobby:', err);
        if (el) { 
          el.innerText = '❌ Firestore Error: ' + err.message; 
          el.style.color = '#ff6b6b';
        }
        if (fsStatus) fsStatus.innerHTML = '<span style="color: #ff6b6b;">❌ ' + err.message + '</span>';
        return;
      }

      // Update heartbeat every 10s
      const heartbeatInterval = setInterval(async () => {
        try {
          await setDoc(myRef, { ts: serverTimestamp() }, { merge: true });
        } catch(e) {}
      }, 10000);

      // Clean up stale entries (older than 30s) every 15s
      setInterval(async () => {
        const cutoff = Date.now() - 30000;
        const snapshot = await getDocs(collection(db, 'peer-lobby'));
        snapshot.forEach(async (d) => {
          const data = d.data();
          if (data.ts && data.ts.toMillis && data.ts.toMillis() < cutoff && d.id !== mySessionId) {
            await deleteDoc(d.ref);
          }
        });
      }, 15000);

      // Listen to lobby in real-time
      lobbyUnsubscribe = onSnapshot(collection(db, 'peer-lobby'), (snapshot) => {
        if (el) { el.style.color = '#4ade80'; el.style.borderColor = 'rgba(74,222,128,0.3)'; el.style.background = 'rgba(74,222,128,0.1)'; el.innerText = '✅ Connected'; }
        snapshot.forEach(d => {
          const data = d.data();
          if (data.sessionId && data.sessionId !== mySessionId) {
            onlineUsers[data.sessionId] = data;
          }
        });
        // Remove users no longer in snapshot
        const currentIds = new Set();
        snapshot.forEach(d => currentIds.add(d.id));
        for (const sid in onlineUsers) {
          if (!currentIds.has(sid)) delete onlineUsers[sid];
        }
        renderOnlineUsers(Object.values(onlineUsers));
      }, (err) => {
        if (el) { el.innerText = '❌ ' + err.message; }
        console.error(err);
      });

      // Listen for signals addressed to us
      signalUnsubscribe = onSnapshot(
        query(collection(db, 'peer-signals'), where('targetSessionId', '==', mySessionId)),
        (snapshot) => {
          snapshot.docChanges().forEach(async (change) => {
            if (change.type !== 'added') return;
            const sig = change.doc.data();
            console.log('[PEER] Signal received:', sig.event, 'from:', sig.fromSessionId);
            await deleteDoc(change.doc.ref); // consume signal
            if (sig.event === 'connect-request') {
              console.log('[PEER] Received connect-request');
              pendingRequestSessionId = sig.fromSessionId;
              pendingRoomName = sig.roomName || null;
              peerNameFromReq = sig.fromName;
              document.getElementById('request-text').innerText = `${sig.fromName} wants to connect!`;
              document.getElementById('request-overlay').style.display = 'flex';
            } else if (sig.event === 'connect-declined') {
              alert("Your request was declined.");
            } else if (sig.event === 'connect-accepted') {
              handleRequestAccepted(sig.fromSessionId, sig.roomName || null);
            } else if (sig.event === 'webrtc-offer') {
              await handleIncomingOffer(sig.fromSessionId, sig.sdp);
            } else if (sig.event === 'webrtc-answer') {
              await handleIncomingAnswer(sig.fromSessionId, sig.sdp);
            } else if (sig.event === 'webrtc-ice-candidate') {
              await handleIncomingIceCandidate(sig.fromSessionId, sig.candidate);
            } else if (sig.event === 'call-ended') {
              window.endCall(false);
            }
          });
        }
      );

      // Remove ourselves from lobby on tab close
      window.addEventListener('beforeunload', () => {
        deleteDoc(myRef);
        clearInterval(heartbeatInterval);
      });
    }

    async function sendSignal(event, targetSessionId, extra = {}) {
      console.log('[PEER] Sending signal:', event, 'to:', targetSessionId);
      await addDoc(collection(db, 'peer-signals'), {
        event,
        targetSessionId,
        fromSessionId: mySessionId,
        fromName: myName,
        ...extra,
        ts: serverTimestamp()
      });
      console.log('[PEER] Signal sent successfully');
    }

    function renderOnlineUsers(users) {
      document.getElementById('online-count').innerText = users.length;
      const grid = document.getElementById('user-grid');
      grid.innerHTML = '';

      users.forEach((user, index) => {
        const initials = (user.name || '??').substring(0, 2).toUpperCase();
        const colors = ['var(--accent-primary)', 'var(--accent-secondary)', 'var(--accent-danger)'];
        const badgeColors = ['badge-primary', 'badge-secondary', 'badge-danger'];
        const cIndex = index % colors.length;

        const card = document.createElement('div');
        card.className = 'card interactive peer-card user-card';
        card.innerHTML = `
          <div class="user-header">
            <div class="user-info">
              <div class="peer-avatar" style="color: ${colors[cIndex]}">${initials}</div>
              <div>
                <div class="status-badge"><span class="online-dot" style="width: 6px; height: 6px;"></span> Online</div>
              </div>
            </div>
          </div>
          <div>
            <div class="user-name space-grotesk">${user.name}</div>
            <div class="user-degree">${user.year || ''}</div>
          </div>
          <div>
            <span class="badge ${badgeColors[cIndex]}">${user.domain || 'General'}</span>
          </div>
          <button class="btn btn-secondary" style="width: 100%; justify-content: space-between;" onclick="connectPeer('${user.sessionId}', '${(user.name || '').replace(/'/g, "\\'")}')">
            Connect <i class="ti ti-arrow-right"></i>
          </button>
        `;
        grid.appendChild(card);
      });
    }

    function buildRoomName(targetSessionId) {
      const safeTarget = (targetSessionId || mySessionId).replace(/[^a-zA-Z0-9]/g, '').slice(0, 10);
      const safeMe = mySessionId.replace(/[^a-zA-Z0-9]/g, '').slice(0, 10);
      return `mirror-${safeMe}-${safeTarget}-${Date.now().toString(36)}`.toLowerCase();
    }

    function getDailyRoomUrl(roomName) {
      return `https://peertopeer.daily.co/${roomName}`;
    }

    window.connectPeer = function (targetSessionId, peerName) {
      console.log('[PEER] connectPeer called with:', { targetSessionId, peerName });
      targetPeerName = peerName;
      const roomName = buildRoomName(targetSessionId);
      pendingRoomName = roomName;
      console.log('[PEER] Sending connect-request signal');
      sendSignal('connect-request', targetSessionId, { fromDomain: myDomain, roomName });
      alert("Request sent to " + peerName + "! A 30-minute video session will start once they accept.");
    }

    window.declineRequest = function () {
      if (pendingRequestSessionId) {
        sendSignal('connect-declined', pendingRequestSessionId);
      }
      pendingRequestSessionId = null;
      pendingRoomName = null;
      document.getElementById('request-overlay').style.display = 'none';
    }

    // --- WebRTC Call Logic ---
    let currentPeerSessionId = null;
    let timerInterval;
    let peerConnection = null;
    let localStream = null;
    let remoteStream = null;
    let localVideoEl = null;
    let remoteVideoEl = null;
    let isInitiator = false;

    function startTimer() {
      let timeLeft = SESSION_DURATION_MINUTES * 60;
      const timerEl = document.getElementById('call-timer');
      timerEl.innerText = `${SESSION_DURATION_MINUTES.toString().padStart(2, '0')}:00`;
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
        const s = (timeLeft % 60).toString().padStart(2, '0');
        timerEl.innerText = `${m}:${s}`;
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          window.endCall();
        }
      }, 1000);
    }

    function setupVideoLayout() {
      const container = document.getElementById('daily-container');
      container.innerHTML = '';
      container.className = 'video-shell';

      const localCard = document.createElement('div');
      localCard.className = 'video-card';
      localCard.innerHTML = '<video id="local-video" autoplay muted playsinline></video><div class="video-label">You</div>';
      container.appendChild(localCard);

      const remoteCard = document.createElement('div');
      remoteCard.className = 'video-card';
      remoteCard.innerHTML = '<video id="remote-video" autoplay playsinline></video><div class="video-label">Peer</div>';
      container.appendChild(remoteCard);

      localVideoEl = document.getElementById('local-video');
      remoteVideoEl = document.getElementById('remote-video');
    }

    function createPeerConnection() {
      if (peerConnection) {
        console.log('[PEER] Reusing existing peer connection');
        return peerConnection;
      }

      console.log('[PEER] Creating new peer connection');

      peerConnection = new RTCPeerConnection({
        iceServers: [
          { urls: ['stun:stun.l.google.com:19302'] },
          { urls: ['stun:stun1.l.google.com:19302'] },
          { urls: ['stun:stun2.l.google.com:19302'] },
          { urls: ['stun:stun3.l.google.com:19302'] },
          { urls: ['stun:stun4.l.google.com:19302'] }
        ],
        iceCandidatePoolSize: 0
      });

      peerConnection.ontrack = (event) => {
        console.log('[PEER] Received remote track:', event.track.kind);
        remoteStream = event.streams[0];
        if (remoteVideoEl) {
          remoteVideoEl.srcObject = remoteStream;
          remoteVideoEl.muted = false;
          remoteVideoEl.play().catch(() => {});
        }
      };

      peerConnection.onicecandidate = async (event) => {
        if (event.candidate && currentPeerSessionId) {
          console.log('[PEER] Sending ICE candidate');
          await sendSignal('webrtc-ice-candidate', currentPeerSessionId, {
            candidate: event.candidate.toJSON()
          });
        }
      };

      peerConnection.onconnectionstatechange = () => {
        if (peerConnection.connectionState === 'connected') {
          const statusEl = document.getElementById('conn-status');
          if (statusEl) {
            statusEl.innerText = '✅ Connected';
            statusEl.style.color = '#4ade80';
            statusEl.style.borderColor = 'rgba(74,222,128,0.3)';
            statusEl.style.background = 'rgba(74,222,128,0.1)';
          }
        }
      };

      return peerConnection;
    }

    async function ensureLocalMedia() {
      if (localStream) return localStream;

      try {
        console.log('[PEER] Requesting camera/microphone access...');
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        console.log('[PEER] Camera/mic access granted');
        if (localVideoEl) {
          localVideoEl.srcObject = localStream;
          await localVideoEl.play().catch(() => {});
        }
      } catch (err) {
        console.error('[PEER] Camera/mic access failed:', err);
        alert('Camera and microphone access are required for the peer call.');
        throw err;
      }

      return localStream;
    }

    async function attachLocalStreamToPeer() {
      const stream = await ensureLocalMedia();
      const pc = createPeerConnection();
      
      // Check if tracks are already added
      const existingSenders = pc.getSenders();
      const existingTracks = new Set(existingSenders.map(s => s.track?.id));
      
      stream.getTracks().forEach((track) => {
        if (!existingTracks.has(track.id)) {
          console.log('[PEER] Adding local track:', track.kind);
          try {
            pc.addTrack(track, stream);
          } catch (err) {
            console.error('[PEER] Error adding track:', err);
          }
        } else {
          console.log('[PEER] Track already added:', track.kind);
        }
      });
      return pc;
    }

    function serializeSessionDescription(description) {
      if (!description) return null;
      return { type: description.type, sdp: description.sdp };
    }

    async function startWebRTCCall(peerSessionId, initiator = false) {
      currentPeerSessionId = peerSessionId;
      document.getElementById('main-content').style.display = 'none';
      document.getElementById('video-container').style.display = 'flex';
      setupVideoLayout();
      isInitiator = initiator;

      await attachLocalStreamToPeer();
      startTimer();

      if (initiator) {
        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
        await sendSignal('webrtc-offer', peerSessionId, { sdp: serializeSessionDescription(offer) });
      }
    }

    async function handleIncomingOffer(fromSessionId, sdp) {
      console.log('[PEER] Received offer from:', fromSessionId);
      
      // If this is the first time receiving an offer, initialize the connection
      if (!peerConnection) {
        await startWebRTCCall(fromSessionId, false);
      } else {
        // Peer connection already exists, just set the remote description
        console.log('[PEER] Peer connection already exists, handling offer directly');
      }

      if (peerConnection && sdp) {
        console.log('[PEER] Current connection state:', peerConnection.signalingState);
        // Only set remote description if we're in the right state
        if (peerConnection.signalingState === 'stable' || peerConnection.signalingState === 'have-local-offer') {
          try {
            console.log('[PEER] Setting remote description from offer...');
            await peerConnection.setRemoteDescription(new RTCSessionDescription(sdp));
            console.log('[PEER] Remote description set, creating answer...');
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            console.log('[PEER] Sending answer to peer...');
            await sendSignal('webrtc-answer', fromSessionId, { sdp: serializeSessionDescription(answer) });
          } catch (err) {
            console.error('[PEER] Error handling offer:', err);
          }
        } else {
          console.warn('[PEER] Ignoring offer in state:', peerConnection.signalingState);
        }
      }
    }

    async function handleIncomingAnswer(fromSessionId, sdp) {
      console.log('[PEER] Received answer from:', fromSessionId);
      if (peerConnection && sdp) {
        console.log('[PEER] Current connection state:', peerConnection.signalingState);
        // Only set remote description if we're in have-local-offer state
        if (peerConnection.signalingState === 'have-local-offer') {
          try {
            console.log('[PEER] Setting remote description from answer...');
            await peerConnection.setRemoteDescription(new RTCSessionDescription(sdp));
            console.log('[PEER] Remote description set successfully');
          } catch (err) {
            console.error('[PEER] Error handling answer:', err);
          }
        } else {
          console.warn('[PEER] Ignoring answer in state:', peerConnection.signalingState, '(expected have-local-offer)');
        }
      }
    }

    async function handleIncomingIceCandidate(fromSessionId, candidate) {
      if (peerConnection && candidate) {
        try {
          console.log('[PEER] Adding ICE candidate from:', fromSessionId);
          await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
        } catch (err) {
          console.warn('[PEER] ICE candidate ignored:', err.message);
        }
      }
    }

    // Callee accepts
    window.acceptRequest = async function () {
      console.log('[PEER] acceptRequest called');
      document.getElementById('request-overlay').style.display = 'none';
      currentPeerSessionId = pendingRequestSessionId;
      document.getElementById('peer-name').innerText = peerNameFromReq;

      const roomNameToUse = pendingRoomName || buildRoomName(currentPeerSessionId);
      console.log('[PEER] Sending connect-accepted signal');
      await sendSignal('connect-accepted', currentPeerSessionId, { roomName: roomNameToUse });
      console.log('[PEER] Starting WebRTC call as callee');
      await startWebRTCCall(currentPeerSessionId, false);
    }

    // Caller receives acceptance
    async function handleRequestAccepted(fromSessionId, roomName = null) {
      console.log('[PEER] handleRequestAccepted called with:', { fromSessionId, roomName });
      alert("Request Accepted! Joining your 30-minute video session...");
      currentPeerSessionId = fromSessionId;
      document.getElementById('peer-name').innerText = targetPeerName;

      const roomNameToUse = roomName || pendingRoomName || buildRoomName(fromSessionId);
      console.log('[PEER] Starting WebRTC call as initiator');
      await startWebRTCCall(fromSessionId, true);
    }

    window.endCall = async function (notify = true) {
      if (notify && currentPeerSessionId) {
        await sendSignal('call-ended', currentPeerSessionId);
      }

      if (peerConnection) {
        peerConnection.close();
        peerConnection = null;
      }

      if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
        localStream = null;
      }

      if (remoteVideoEl) {
        remoteVideoEl.srcObject = null;
      }
      if (localVideoEl) {
        localVideoEl.srcObject = null;
      }

      document.getElementById('daily-container').innerHTML = '';
      document.getElementById('video-container').style.display = 'none';
      document.getElementById('main-content').style.display = 'block';
      clearInterval(timerInterval);
      document.getElementById('call-timer').innerText = `${SESSION_DURATION_MINUTES.toString().padStart(2, '0')}:00`;
      currentPeerSessionId = null;
      pendingRoomName = null;
      isInitiator = false;
    }
  </script>
</body>
