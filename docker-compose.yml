version: '3.8'

services:
  backend-node:
    build: ./backend-node
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
    env_file:
      - ./backend-node/.env

  backend-python:
    build: ./backend-python
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=app.py
      - FLASK_RUN_PORT=5000
    env_file:
      - ./backend-python/.env
